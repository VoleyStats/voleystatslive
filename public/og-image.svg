<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F1A"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3D6BFF"/>
      <stop offset="1" stop-color="#2140B4"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9CB8FF"/>
      <stop offset="0.6" stop-color="#6E93FF"/>
      <stop offset="1" stop-color="#CBFB45"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3D6BFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3D6BFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#7888BE" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="300" cy="120" rx="420" ry="320" fill="url(#glow)"/>

  <!-- Brand -->
  <g transform="translate(80,72)">
    <rect width="60" height="60" rx="15" fill="url(#mark)"/>
    <rect x="14" y="32" width="7" height="13" rx="3.5" fill="#fff"/>
    <rect x="26.5" y="24" width="7" height="21" rx="3.5" fill="#fff"/>
    <rect x="39" y="17" width="7" height="28" rx="3.5" fill="#CBFB45"/>
    <circle cx="42.5" cy="14" r="4.5" fill="#CBFB45"/>
    <text x="80" y="42" font-family="'Space Grotesk',Inter,sans-serif" font-size="30" font-weight="700" fill="#ffffff">VoleyStats Live</text>
  </g>

  <!-- Headline -->
  <text x="80" y="300" font-family="'Space Grotesk',Inter,sans-serif" font-size="82" font-weight="700" fill="#ffffff">Estadísticas de voleibol</text>
  <text x="80" y="392" font-family="'Space Grotesk',Inter,sans-serif" font-size="82" font-weight="700" fill="url(#txt)">en directo.</text>

  <text x="80" y="466" font-family="Inter,sans-serif" font-size="30" fill="#94A3B8">Marcador en vivo · Eficiencia por jugador y por área · Informes en PDF</text>

  <!-- Score chip -->
  <g transform="translate(80,520)">
    <rect width="360" height="64" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="30" cy="32" r="6" fill="#CBFB45"/>
    <text x="48" y="40" font-family="Inter,sans-serif" font-size="22" font-weight="600" fill="#CBFB45">EN VIVO</text>
    <text x="170" y="40" font-family="'Space Grotesk',sans-serif" font-size="26" font-weight="700" fill="#9CB8FF">21</text>
    <text x="205" y="40" font-family="Inter,sans-serif" font-size="22" fill="#64748B">—</text>
    <text x="230" y="40" font-family="'Space Grotesk',sans-serif" font-size="26" font-weight="700" fill="#CBD5E1">18</text>
    <text x="270" y="40" font-family="Inter,sans-serif" font-size="18" fill="#64748B">Set 3</text>
  </g>
</svg>
