    <!-- Structured data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Voley Stats Live",
        "applicationCategory": "SportsApplication",
        "operatingSystem": "Web, Android, iOS",
        "description": "Aplicación para registrar y consultar estadísticas de voleibol en tiempo real. Permite seguir el marcador en vivo, medir la eficiencia por jugador y por área del juego (recepción, saque, ataque, bloqueo, defensa y colocación), analizar las estadísticas set a set y descargar informes en PDF.",

        "inLanguage": "es",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        },
        "featureList": [
          "Marcador de voleibol en vivo",
          "Estadísticas por jugador",
          "Análisis por áreas del juego",
          "Curva de registro de puntos y errores",
          "Informes descargables en PDF",
          "Acceso a las estadísticas online mediante código de equipo"
        ]
      }
    </script>

    <!-- Structured data: Organization + WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Voley Stats Live",
        "url": "https://voleystatslive.com/",
        "logo": "https://voleystatslive.com/favicon.svg"
      }
    </script>

    <!-- Structured data: FAQ (mantener sincronizado con src/pages/Home.vue) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué es Voley Stats Live?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Es una aplicación para registrar y consultar estadísticas de voleibol en tiempo real. Anotas cada acción del partido desde la app y cualquiera puede seguir el marcador y las estadísticas en vivo desde la web usando el código del equipo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo consulto las estadísticas de mi equipo online?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Entra en la sección 'Ver en vivo', introduce el código de tu equipo y accede al marcador y a las estadísticas del partido en directo, con desglose por set y por jugador."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué estadísticas puedo registrar?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Puedes registrar acciones en las seis áreas del juego: recepción, saque, ataque, bloqueo, defensa y colocación, además del marcador, las rachas y la eficiencia de cada jugador."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo descargar un informe del partido?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Al finalizar el partido puedes generar un PDF con el resumen por set y por jugador para analizarlo y compartirlo con el equipo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Necesito conexión a internet?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí, las estadísticas se sincronizan en tiempo real, por lo que necesitas conexión para registrar acciones y para que los demás vean el directo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto cuesta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Puedes empezar a usar Voley Stats Live de forma gratuita. Descarga la app e introduce el código de tu equipo para comenzar a registrar y consultar estadísticas."
            }
          }
        ]
      }
    </script>

        <h1>Voley Stats Live — Estadísticas de voleibol en vivo</h1>
        <p>
          Voley Stats Live es una aplicación para registrar y consultar
          estadísticas de voleibol en tiempo real. Sigue el marcador en directo,
          mide la eficiencia por jugador y por área del juego (recepción, saque,
          ataque, bloqueo, defensa y colocación), analiza cada set y descarga
          informes en PDF. Activa JavaScript para usar la aplicación.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
