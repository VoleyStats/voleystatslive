    <!-- Structured data: FAQ (mantener sincronizado con src/i18n/es.json → home.faq) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué es Voley Stats Live?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Es la web en directo de Voley Stats, la app de iPad para capturar y analizar estadísticas de voleibol. Anotas cada acción del partido desde la app y cualquiera puede seguir el marcador y las estadísticas en vivo desde esta web, gratis y sin registrarse."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cómo consulto las estadísticas de mi equipo online?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Entra en la sección 'Ver en vivo', introduce el código de tu equipo y accede al marcador y a las estadísticas del partido en directo, con desglose por set y por jugador."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué estadísticas puedo registrar?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Todo lo que pasa en la pista: cada toque o solo las acciones que acaban en punto, trayectorias de ataque y saque sobre el mapa de la pista, recepción valorada en 4 niveles, calidad de saque, juego por fases K1/K2, cambios y tiempos muertos. El marcador, la rotación y el sacador se actualizan solos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo descargar un informe del partido?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Al terminar el partido la app genera un informe completo: side-out y break, origen de los puntos, rotaciones, ataque por fase y por calidad de pase, conexiones colocadora-atacante, errores no forzados y mapas de ataque. Con el plan premium puedes exportarlo en PDF para compartirlo con el equipo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Necesito conexión a internet?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No para anotar: la app funciona completamente sin conexión, con base de datos local, así que puedes capturar y consultar estadísticas en cualquier pabellón. Solo necesitas internet para compartir el directo en esta web, usar el overlay para OBS, la página pública del equipo o la copia de seguridad en la nube."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto cuesta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Descargar la app y anotar tus partidos es gratis, incluidas las estadísticas en directo de cada partido. El plan premium añade el histórico del equipo y las estadísticas de temporada con filtros, la exportación en PDF, la copia de seguridad en la nube y la posibilidad de completar a posteriori estadísticas que no anotaste en vivo. Ver los directos desde la web es siempre gratis."
            }
          }
        ]
